<p-toast></p-toast>
<div class="container-fluid">
    <div class="div-conten grid p-fluid">
        <p class="pi pi-pen-to-square"> Ajustar inventario:</p>
        <br>
        <span> Fecha:
            {{fecha_actual}}
        </span>
        <br>
        <br>
        <div class="content">
            <form [formGroup]="data">
                <div class="flex justify-center flex-wrap gap-4 mb-6">
                    <input type="text" #codigo placeholder="Lea código producto:" pInputText style="width:100%;"
                        formControlName="codigo" (keydown)="onEnterPressed($event)">
                </div>
                <div class="flex justify-center flex-wrap gap-4 mb-6">
                    <input type="text" #cantidad placeholder="Ingrese cantidad:" class="mt-3" pInputText
                        style="width:100%;" formControlName="cantidad">
                </div>
            </form>
            <div class="flex justify-center flex-wrap gap-4 mb-6">
                <button pButton pRipple type="button" [disabled]="habilitado" label="Guardar" icon="pi pi-save"
                    iconPos="left" class="p-button-success w-full" (click)="functEditaCantidad();"></button>
            </div>
        </div>
    </div>
</div>
