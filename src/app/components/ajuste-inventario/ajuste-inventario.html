<p-toast></p-toast>
<div class="container-fluid">
    <div class="div-conten grid p-fluid">
        <p class="pi pi-pen-to-square"> Ajustar inventario:</p>
        <br>
        <span> Fecha:
            {{fecha_actual}}
        </span>
        <br>
        <hr>
        <div class="content">
            <form [formGroup]="data">
                <div class="flex flex-col gap-2 mt-1">
                    <label for="codigo">Lea código producto</label>
                    <input type="text" id="codigo" pInputText formControlName="codigo"
                        (keydown)="onEnterPressed($event)" autocomplete="off">
                </div>
                <div class="flex flex-col gap-2 mt-1">
                    <label for="cantidad">Inrese cantidad</label>
                    <input type="text" id="cantidad" pInputText formControlName="cantidad">
                </div>
            </form>
            <div class="flex flex-col gap-2 mt-3">
                <button pButton pRipple type="button" [disabled]="habilitado" label="Guardar" icon="pi pi-save"
                    iconPos="left" class="p-button-success w-full" (click)="functEditaCantidad();"></button>
            </div>
        </div>
    </div>
</div>
