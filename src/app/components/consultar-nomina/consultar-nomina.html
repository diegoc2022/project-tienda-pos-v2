<p-toast></p-toast>
<div class="container-fluid">
    <div class="conten-ppal">
        <div class="content-int">
            <p class="pi pi-search-plus"> Consultar nómina:</p>
            <form [formGroup]="data2">
                <div class="content-1">
                    <div class="item-1">
                        <div class="flex flex-col gap-2">
                            <label for="codigo">Elija empleado</label>
                            <p-select [(ngModel)]="seleccionado3" [options]="data_empleados" optionValue="cedula"
                                placeholder="Elija empleado" optionLabel="nombre"
                                [panelStyle]="{'max-height': '500px', 'overflow-x': 'auto'}" [showClear]="true"
                                formControlName="cedula" (onChange)="funct_onchange($event);" />
                        </div>
                    </div>
                    <div class="item-1">
                        <div class="flex flex-col gap-2">
                            <label for="codigo">Selecciones fecha inicial</label>
                            <p-datepicker formControlName="fecha_d" dateFormat="dd-mm-yy" [showClear]="true"
                                showIcon="true" showIcon iconDisplay="input" />
                        </div>
                    </div>
                </div>

                <div class="content-2">
                    <div class="item-2">
                        <div class="flex flex-col gap-2 mt-1">
                            <label for="codigo">Selecciones fecha final</label>
                            <p-datepicker formControlName="fecha_h" dateFormat="dd-mm-yy" [showClear]="true"
                                showIcon="true" showIcon iconDisplay="input" />
                        </div>
                    </div>
                    <div class="item-2">
                        <div class="flex flex-col gap-2 mt-1">
                            <label for="titulo">.</label>
                            <button pButton pRipple label="Consultar nómina" icon="pi pi-search"
                                (click)="funct_retorna_pago_nomina_c();" class="p-button-success w-full"></button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
        <div class="content-int-2">
            <div class="content-3">
                <div class="item-3">
                    <p-table #dt2 [value]="pago_nomina" selectionMode="single"
                        styleClass="p-datatable-sm p-datatable-striped" class="custom-table" [scrollable]="true"
                        scrollHeight="28vh">>
                        <ng-template pTemplate="header">
                            <tr>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Fecha desde</th>
                                <th>Fecha hasta</th>
                                <th>Concepto</th>
                                <th>Valor pago</th>

                            </tr>
                        </ng-template>
                        <ng-template pTemplate="body" let-dataNomina>
                            <tr>
                                <td>{{dataNomina.cedula}}</td>
                                <td>{{nombre}}</td>
                                <td>{{dataNomina.fecha_desde}}</td>
                                <td>{{dataNomina.fecha_hasta}}</td>
                                <td>{{dataNomina.concepto}}</td>
                                <td>{{dataNomina.valor_pago | currency: 'USD'}}</td>
                            </tr>
                        </ng-template>
                    </p-table>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-12 field">
                    <p>Total nómina: {{total_nomina | currency: 'USD'}}</p>
                </div>
            </div>
        </div>
    </div>
</div>
