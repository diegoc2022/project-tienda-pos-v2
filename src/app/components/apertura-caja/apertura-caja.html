<p-toast></p-toast>
<div class="container-fluid">
    <div class="div-conten grid p-fluid">
        <p class="pi pi-pen-to-square"> Apertura de caja:</p>
        <br>
        <span> Fecha apertura:
            {{fecha_actual | date:'yyyy-MM-dd'}}
        </span>
        <hr>
        <div class="content">
            <div class="flex flex-col">
                <form [formGroup]="formId">
                    <label for="integeronly">Ingrese base caja</label>
                    <p-inputNumber inputId="integeronly" formControlName="base"></p-inputNumber>
                </form>
            </div>
            <div class="flex flex-col">
                <button pButton pRipple type="button" label="Generar apertura" icon="pi pi-save" iconPos="left"
                    class="p-button-success w-full" (click)="funcAperturaCaja();"></button>
            </div>
        </div>
    </div>
</div>
